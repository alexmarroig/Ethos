<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ETHOS - Limpando cache</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1519;
        color: #eef4f5;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        width: min(420px, calc(100vw - 40px));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: #151d22;
        padding: 24px;
      }

      p {
        color: #aebdc3;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Limpando cache do ETHOS...</h1>
      <p>Esta pagina remove o service worker antigo e recarrega a versao mais recente do aplicativo.</p>
    </main>
    <script>
      async function resetEthosWeb() {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        window.localStorage.removeItem("vite-pwa-register-sw");
        window.sessionStorage.clear();
        window.location.replace("/?fresh=" + Date.now());
      }

      resetEthosWeb().catch(() => {
        window.location.replace("/?fresh=" + Date.now());
      });
    </script>
  </body>
</html>
